---
- name: Install rsyslog
  ansible.builtin.dnf:
    name: rsyslog
    state: present

- name: Configure servera as TCP syslog receiver
  ansible.builtin.template:
    src: servera.conf.j2
    dest: /etc/rsyslog.d/10-nexcore-server.conf
    mode: '0644'
  when: inventory_hostname == 'servera'
  notify: Restart rsyslog

- name: Configure serverb forwarding to servera
  ansible.builtin.template:
    src: serverb-forward.conf.j2
    dest: /etc/rsyslog.d/10-nexcore-forward.conf
    mode: '0644'
  when: inventory_hostname == 'serverb'
  notify: Restart rsyslog

- name: Create remote log directory on servera
  ansible.builtin.file:
    path: /var/log/remote
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: inventory_hostname == 'servera'

- name: Open rsyslog TCP port on servera
  ansible.posix.firewalld:
    port: 514/tcp
    permanent: true
    immediate: true
    state: enabled
  when: inventory_hostname == 'servera'

- name: Enable rsyslog
  ansible.builtin.service:
    name: rsyslog
    enabled: true
    state: started

