---
- name: Install dnf-utils for reboot detection
  ansible.builtin.dnf:
    name: dnf-utils
    state: present
    disable_gpg_check: true

- name: Deploy NexCore health script
  ansible.builtin.copy:
    dest: /usr/local/bin/nexcore-health.sh
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/bin/bash
      {
        echo "===== NexCore Health Report ====="
        echo "Date: $(date)"
        echo "Hostname: $(hostname)"
        echo "Uptime: $(uptime)"
        echo "Disk usage:"
        df -h
        echo
      } >> {{ health_log }}

- name: Schedule daily NexCore health check at 03:00
  ansible.builtin.cron:
    name: nexcore daily health check
    minute: '0'
    hour: '3'
    job: /usr/local/bin/nexcore-health.sh

- name: Check available package updates
  ansible.builtin.command: dnf check-update
  register: patch_result
  failed_when: patch_result.rc not in [0, 100]
  changed_when: patch_result.rc == 100

- name: Weekly package cache cleanup
  ansible.builtin.cron:
    name: nexcore weekly dnf cache cleanup
    weekday: '0'
    hour: '4'
    minute: '0'
    job: /usr/bin/dnf clean all

- name: Check whether reboot is required
  ansible.builtin.command: needs-restarting -r
  register: reboot_required
  failed_when: false
  changed_when: reboot_required.rc == 1

- name: Reboot automatically when required after patching
  ansible.builtin.reboot:
    reboot_timeout: 900
  when: reboot_required.rc == 1

- name: Send daily patch/health summary to ops01
  ansible.builtin.cron:
    name: nexcore daily email summary
    minute: '30'
    hour: '3'
    job: "tail -100 {{ health_log }} | mail -s 'NexCore health summary' {{ ops_email }}"